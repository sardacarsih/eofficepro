name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eoffice
          POSTGRES_PASSWORD: eoffice_ci
          POSTGRES_DB: eoffice
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eoffice"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Vet
        run: go vet ./...
      - name: Migrate database
        run: go run ./cmd/migrate up
        env:
          DATABASE_URL: postgres://eoffice:eoffice_ci@localhost:5432/eoffice?sslmode=disable
      - name: Test (unit + integration)
        run: go test ./... -count=1
        env:
          EOFFICE_INTEGRATION_DB_URL: postgres://eoffice:eoffice_ci@localhost:5432/eoffice?sslmode=disable

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: govulncheck (backend)
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: npm audit (web)
        working-directory: web
        run: npm audit --omit=dev --audit-level=high

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  mobile:
    name: Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.2
          channel: stable
          cache: true
      - name: Install dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
